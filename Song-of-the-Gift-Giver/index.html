<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morsin's Monsters — The Sealed Archives</title>
    <!-- Favicon link customized -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- Elegant cinematic fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #020202;
            --parchment: #e8dcc4;
            --gold: #d4af37;
            --gold-dim: #7a631c;
            --gold-glow: rgba(212, 175, 55, 0.25);
            --ui-bg: rgba(7, 9, 11, 0.75);
            --border-elegant: 1px solid rgba(212, 175, 55, 0.25);
            --font-serif: 'Cinzel', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-deep);
            color: var(--parchment);
            font-family: var(--font-sans);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        /* Cinematic Film Grain Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 999;
        }

        /* Atmospheric Magic Particles */
        #magicCanvas {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* --- STAGE 1: THE WARDED GATEKEEPER --- */
        #gatekeeper {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0a0d12 0%, #000000 100%);
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.5s;
        }

        #gatekeeper.unlocked {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .ward-sigil {
            width: 80px; height: 80px;
            border: 2px solid var(--gold-dim);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 2rem;
            position: relative;
            animation: breathe 4s infinite alternate ease-in-out;
        }

        .ward-sigil::before {
            content: '';
            position: absolute;
            width: 60px; height: 60px;
            border: 1px solid var(--gold);
            transform: rotate(45deg);
        }

        @keyframes breathe {
            0% { box-shadow: 0 0 10px var(--gold-glow), inset 0 0 10px var(--gold-glow); transform: scale(0.98); }
            100% { box-shadow: 0 0 30px var(--gold-glow), inset 0 0 20px var(--gold-glow); transform: scale(1.02); }
        }

        .ward-container {
            text-align: center;
            max-width: 600px;
            width: 90%;
            padding: 4rem 3rem;
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: inset 0 0 40px rgba(0,0,0,1), 0 0 20px rgba(212, 175, 55, 0.05);
            position: relative;
            z-index: 2;
        }

        .ward-container::before {
            content: ''; position: absolute;
            top: 8px; right: 8px; bottom: 8px; left: 8px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            pointer-events: none;
        }

        /* Animated Sigils */
        .ward-sigils {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }

        .ward-sigils span {
            display: inline-block;
            animation: floatGlow 3s infinite ease-in-out;
            text-shadow: 0 0 10px var(--gold);
        }

        .ward-sigils span:nth-child(1) { animation-delay: 0s; font-size: 1.4rem; }
        .ward-sigils span:nth-child(2) { animation-delay: 1.5s; font-size: 2rem; color: #fff; text-shadow: 0 0 15px var(--gold); }
        .ward-sigils span:nth-child(3) { animation-delay: 0s; font-size: 1.4rem; }

        @keyframes floatGlow {
            0%, 100% { transform: translateY(0); opacity: 0.7; }
            50% { transform: translateY(-5px); opacity: 1; text-shadow: 0 0 20px var(--gold); }
        }

        .ward-title {
            font-family: var(--font-serif); font-size: 1.8rem; color: #fff;
            letter-spacing: 8px; margin-bottom: 2rem; font-weight: 400;
        }

        .ward-instructions {
            font-size: 0.95rem; line-height: 1.8; color: #7a8794;
            font-style: italic; margin-bottom: 3.5rem; font-weight: 300;
        }

        .password-input {
            width: 80%; background: transparent; border: none;
            border-bottom: 1px solid var(--gold-dim);
            padding: 0.8rem; color: var(--gold);
            font-family: var(--font-serif); font-size: 1.1rem;
            text-align: center; letter-spacing: 4px; outline: none;
            transition: all 0.4s ease; margin-bottom: 2.5rem; text-transform: uppercase;
        }

        .password-input:focus {
            border-bottom: 1px solid var(--gold);
            box-shadow: 0 10px 15px -10px var(--gold-glow);
        }
        .password-input::placeholder { color: rgba(212, 175, 55, 0.2); }

        .breach-btn {
            background: transparent; border: 1px solid var(--gold-dim);
            color: var(--parchment); font-family: var(--font-serif);
            padding: 0.8rem 3rem; font-size: 0.9rem; cursor: pointer;
            letter-spacing: 5px; transition: all 0.4s ease; text-transform: uppercase;
        }

        .breach-btn:hover {
            background: rgba(212, 175, 55, 0.05); border-color: var(--gold);
            color: var(--gold); box-shadow: 0 0 20px var(--gold-glow) inset;
        }

        .ward-feedback {
            margin-top: 1.5rem; font-size: 0.8rem; height: 20px;
            color: #c75c5c; font-family: var(--font-serif); letter-spacing: 2px;
            opacity: 0; transition: opacity 0.3s;
        }

        /* =========================================
           STAGE 2: ACCORDION GALLERY
           ========================================= */
        #archiveMuseum {
            width: 100vw; height: 100vh; display: flex; opacity: 0; transition: opacity 1.5s ease 0.5s;
        }
        #archiveMuseum.visible { opacity: 1; }

        .cinematic-panel {
            flex: 1; height: 100vh; position: relative; overflow: hidden; cursor: pointer;
            border-right: 1px solid rgba(255, 255, 255, 0.05); transition: flex 0.7s cubic-bezier(0.25, 1, 0.2, 1);
        }
        .cinematic-panel:last-child { border-right: none; }
        .cinematic-panel:hover { flex: 3; }

        .panel-img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(40%) brightness(0.7); transition: all 0.7s ease;
        }
        .cinematic-panel:hover .panel-img { filter: grayscale(0%) brightness(1.05); transform: scale(1.02); }

        /* Custom Object-Positions to guarantee faces stay inside the vertical slivers */
        .thumb-sora { object-position: 85% 15%; }
        .thumb-vivian { object-position: 50% 10%; }
        .thumb-felix { object-position: 50% 10%; }
        .thumb-hazel { object-position: 50% 15%; }
        .thumb-erik { object-position: 78% 30%; }
        .thumb-alexandria { object-position: 50% 15%; }

        .panel-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            padding: 3rem 1.5rem 2rem 1.5rem; transform: translateY(20px); opacity: 0.6; transition: all 0.5s ease;
        }
        .cinematic-panel:hover .panel-overlay { transform: translateY(0); opacity: 1; }

        .panel-title { font-family: var(--font-serif); font-size: 1.5rem; color: var(--gold); letter-spacing: 2px; white-space: nowrap; }

        /* BRANDING AND HEADER LINK */
        .brand-header {
            position: absolute;
            top: 3rem;
            left: 5vw;
            z-index: 50;
            pointer-events: auto;
        }

        .logo-img {
            height: 48px;
            width: auto;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
            transition: transform 0.4s ease;
        }

        .brand-header:hover .logo-img {
            transform: scale(1.03) rotate(-1deg);
        }

        /* --- THE ARCHIVE FOOTER --- */
        .archive-footer {
            position: absolute;
            bottom: 3rem;
            left: 5vw;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            pointer-events: auto;
        }

        .social-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .social-links a {
            color: rgba(232, 220, 196, 0.4);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: var(--font-serif);
            transition: color 0.3s, text-shadow 0.3s;
        }

        .social-links a:hover {
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold-glow);
        }

        .credit-text {
            font-size: 0.65rem;
            color: rgba(232, 220, 196, 0.15);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* =========================================
           STAGE 3: FULL-SCREEN CODEX PROFILE
           ========================================= */
        #profileModal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 200; background: #000; opacity: 0; visibility: hidden; pointer-events: none;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #profileModal.open { opacity: 1; visibility: visible; pointer-events: auto; }

        .modal-bg-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; transition: opacity 0.4s ease; z-index: 1;
        }

        /* Dynamic classes for full screen (0% to preserve upper hair, centered Erik) */
        .full-preserve-hair { object-position: center 0%; }
        .full-standard { object-position: center 15%; }

        /* "Show More" Disappear Gradation */
        .modal-gradient {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(2, 3, 4, 0.98) 0%, rgba(2, 3, 4, 0.75) 30%, transparent 55%),
                        linear-gradient(0deg, rgba(2, 3, 4, 0.8) 0%, transparent 15%);
            z-index: 2; pointer-events: none;
        }

        .btn-close {
            position: absolute; top: 2rem; right: 3rem; font-size: 3rem;
            color: var(--gold-dim); background: none; border: none; cursor: pointer;
            z-index: 10; font-family: var(--font-sans); font-weight: 300; transition: all 0.3s ease;
        }
        .btn-close:hover { color: var(--gold); transform: rotate(90deg); }

        /* Slimmer UI Card */
        .codex-ui {
            position: absolute; top: 50%; left: 5%; transform: translateY(-50%);
            width: 440px; background: var(--ui-bg); border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 2px; padding: 2.5rem 2.5rem; z-index: 5;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); backdrop-filter: blur(5px);
        }

        .codex-name {
            font-family: var(--font-serif); font-size: 2.2rem; line-height: 1.2; color: var(--gold);
            margin-bottom: 1.5rem; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); text-transform: uppercase;
        }

        .codex-stats {
            border-top: 1px solid rgba(212, 175, 55, 0.2); border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 1rem 0; margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem;
        }

        .stat-row { display: flex; font-size: 0.8rem; letter-spacing: 1px; }
        .stat-label { color: #7a8794; width: 100px; text-transform: uppercase; }
        .stat-val { color: var(--gold); font-weight: 500; text-transform: uppercase;}

        .codex-lore {
            font-size: 0.9rem; line-height: 1.7; color: #cbd3da; margin-bottom: 1.5rem; white-space: pre-wrap; font-weight: 300;
        }

        .codex-quote {
            font-style: italic; color: var(--gold-dim); border-left: 2px solid var(--gold-dim);
            padding-left: 1rem; font-size: 0.85rem; line-height: 1.5; margin-bottom: 2rem;
        }

        /* Navigation & Mystical Dossier Button */
        .codex-nav {
            display: flex; justify-content: space-between; align-items: center; gap: 1rem;
        }

        .nav-btn {
            background: transparent; border: 1px solid var(--gold-dim); color: var(--gold);
            width: 40px; height: 40px; border-radius: 50%; font-size: 1rem; flex-shrink: 0;
            cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.3s ease;
        }
        .nav-btn:hover { background: var(--gold-glow); border-color: var(--gold); color: #fff; }

        .dossier-btn {
            flex-grow: 1; background: transparent; border: 1px solid var(--gold-dim);
            color: var(--parchment); font-family: var(--font-serif); font-size: 0.8rem;
            letter-spacing: 3px; cursor: pointer; transition: all 0.4s ease; height: 40px;
            text-transform: uppercase;
        }

        .dossier-btn:hover {
            background: rgba(212, 175, 55, 0.1); border-color: var(--gold); color: var(--gold);
        }

        /* Fun & Mystique Dossier Decryption Animation */
        .mystic-sealed {
            pointer-events: none;
            animation: mysticScry 3s forwards;
            font-weight: 600;
        }

        @keyframes mysticScry {
            0%   { color: var(--parchment); border-color: var(--gold-dim); text-shadow: none; box-shadow: none; }
            15%  { color: #c75c5c; border-color: #c75c5c; text-shadow: 0 0 10px #c75c5c; box-shadow: inset 0 0 20px rgba(199,92,92,0.3); }
            35%  { color: #fff; border-color: #fff; text-shadow: 0 0 15px #fff; box-shadow: inset 0 0 25px rgba(255,255,255,0.4); transform: scale(0.98); }
            55%  { color: #c75c5c; border-color: #c75c5c; text-shadow: 0 0 15px #c75c5c; box-shadow: inset 0 0 20px rgba(199,92,92,0.3); transform: scale(1.02); }
            80%  { color: var(--gold-dim); border-color: var(--gold-dim); text-shadow: 0 0 10px var(--gold-glow); transform: scale(1); }
            100% { color: var(--parchment); border-color: var(--gold-dim); text-shadow: none; box-shadow: none; }
        }

        @media (max-width: 900px) {
            .codex-ui { left: 50%; transform: translate(-50%, -50%); width: 90%; padding: 2rem; }
            .modal-gradient { background: rgba(2, 3, 4, 0.85); }
        }
    </style>
</head>
<body>

    <canvas id="magicCanvas"></canvas>

    <!-- STAGE 1: GATEKEEPER -->

                <span>✧</span><span>✦</span><span>✧</span>

        </div>
    </div>

   <script>
        // Character Database - Ordered, Updated Labels, and Precise Framing
        const covenData = [
            {
                name: "Sora Park",
                house: "Thunderbird",
                anima: "Bluejay",
                core: "Commoncore / Broombrain Specialist",
                file: "Song of the Gift-Giver, Sora.jpg",
                thumbCrop: "thumb-sora",
                fullCrop: "full-standard", 
                lore: "Erik's fiercely loyal, hyperactive friend and self-appointed bodyguard. Fueled by adrenaline and chaotic energy, she possesses a deep obsession with aerial stunts and the sport of Stravolux.\n\nHer half-Korean heritage is paired with her Bluejay Anima, giving her short hair striking blue undertones. She is blunt, fiercely protective, and completely unafraid to throw a punch to protect her Coven.",
                quote: "\"I'm following this goofball around. Who can tell what trouble he'll get in if I'm not there to help?\""
            },
            {

                house: "Thunderbird",
                anima: "Honeybee",
                core: "Commoncore / Charms Specialist",
                file: "Song of the Gift-Giver, Vivian.jpg",
                thumbCrop: "thumb-vivian",
                fullCrop: "full-preserve-hair", // Top preserved 0%
                lore: "The bright, heavily-accessorized emotional glue holding the Coven together. An expert on cosmetics, gossip, and the human heart, Vivian is the vibrant counterweight to the darkness of Camelot.\n\nDeeply empathetic and loyal, Vivian abandoned her dream of joining the cozy Phoenix House to brave the imposing, power-driven Thunderbird Spire solely to ensure Alexandria wouldn't face her enemies alone.",
                quote: "\"If I'm going to fall in love with someone, why not be in an environment where all the cute boys are well off?\""
            },
            {

                anima: "Silver Dragon",
                core: "Regenerator / Coven Scholar",
                file: "Song of the Gift-Giver, Felix.jpg",
                thumbCrop: "thumb-felix",
                fullCrop: "full-preserve-hair", // Top preserved 0%
                lore: "Dragged from the severe poverty of the mundane world into the brutal, unwarded halls of Dragon House. Felix is a rare 'Regenerator'—his magical output sputters like a dying bulb, but his stamina is completely endless.\n\nArmed with a glowing Ritual Slate, he compensates for his lack of raw talent with relentless, grueling discipline. He is the pragmatic, scholarly anchor of the Coven.",
                quote: "\"One more time. He was no stranger to working hard, and this was a way to directly improve himself.\""
            },
            {
                name: "Hazel Winslow",
                house: "Hydra",
                anima: "Siren",
                core: "Light / Telepathic Noblecore",
                file: "Song of the Gift-Giver, Hazel.jpg",
                thumbCrop: "thumb-hazel",
                fullCrop: "full-standard",
                lore: "A natural mind-mage who recently escaped the fanatical 'Shepherds of the Living Word' cult. Initially terrified of her own raw telepathic abilities, she arrived at Camelot hiding in a hoodie to block out the emotional noise of the world.\n\nShe possesses a divinely beautiful singing voice—a hallmark of her rare Siren Noblecore. Guided to Hydra House to forge her resilience, she is slowly learning to trust.",
                quote: "\"I think I'd like that. We'll keep the professors off your back, and other students won't bug you when they see you with us.\""
            },
            {
                name: "Erik Morsin",
                house: "Thunderbird",
                anima: "White Hart",
                core: "Noblecore / Coven Warden",
                file: "Song of the Gift-Giver, Erik.jpg",
                thumbCrop: "thumb-erik",
                fullCrop: "full-standard",
                lore: "The Crown Heir to the wealthy and deeply hated Duchy of Ireland. Underneath his flawless, practiced smiles, Erik is an incredibly sharp political mastermind who handles assassination attempts with lethal grace.\n\nAffectionately called the 'Gift-Giver,' he is the foundational heart of the Coven. He uses his vast resources to protect his friends while finding a peaceful escape from his family's brutal legacy through his violin.",
                quote: "\"I want to give this a fair chance. I'm not going to ignore you, chase around after other girls for a bunch of years, then finally settle down.\""
            },
            {
                name: "Alexandria Renard",
                house: "Thunderbird",
                anima: "Red Fox",
                core: "Noblecore / Coven Commander",
                file: "Song of the Gift-Giver, Alexandria.jpg",
                thumbCrop: "thumb-alexandria",
                fullCrop: "full-preserve-hair", // Top preserved 0%
                lore: "Betrothed to Erik, Alexandria is a fierce, silent strategist carrying deep facial disfigurements from a targeted political attack. Unable to speak louder than a hoarse whisper, she compensates with an unyielding rage and a genius-level aptitude for combat magic.\n\nShe is determined to conquer magical theory and rise as the next Morgana Le Fay.",
                quote: "\"I'm going to become the most powerful witch in history, and that'll happen in Thunderbird. Damn anyone who stands in my path.\""
            }
        ];


        let currentProfileIndex = 0;

        // --- GATEKEEPER LOGIC ---
        const gatekeeper = document.getElementById("gatekeeper");
        const passInput = document.getElementById("passphrase");
        const breachBtn = document.getElementById("breachBtn");
        const feedback = document.getElementById("feedback");
        const museum = document.getElementById("archiveMuseum");

        function unlock() {
            const input = passInput.value.trim().toLowerCase().replace(/['’\s]/g, "");
            if (input === "morsinsmonsters") {
                feedback.style.color = "var(--gold)";
                feedback.style.opacity = "1";
                feedback.innerText = "The wards yield. Welcome, Monsters.";
                setTimeout(() => {
                    gatekeeper.classList.add("unlocked");
                    museum.classList.add("visible");
                    buildGallery();
                }, 1200);
            } else {
                feedback.style.color = "#c75c5c";
                feedback.style.opacity = "1";
                const errs = [
                    "The magic of Camelot rejects your answer.",
                    "Incorrect. The runes burn hot in warning.",
                    "The ward stands firm. Speak the true name."
                ];
                feedback.innerText = errs[Math.floor(Math.random() * errs.length)];
                passInput.value = "";
                setTimeout(() => { feedback.style.opacity = "0"; }, 3000);
            }
        }

        breachBtn.addEventListener("click", unlock);
        passInput.addEventListener("keydown", (e) => { if (e.key === "Enter") unlock(); });

        // --- GALLERY INJECTION ---
        function buildGallery() {
            museum.innerHTML = "";
            covenData.forEach((char, idx) => {
                const panel = document.createElement("div");
                panel.className = "cinematic-panel";
                panel.innerHTML = `
                    <img class="panel-img ${char.thumbCrop}" src="${char.file}" alt="${char.name}">
                    <div class="panel-overlay">
                        <h3 class="panel-title">${char.name.split(' ')[0]}</h3>
                    </div>
                `;
                panel.addEventListener("click", () => openCodex(idx));
                museum.appendChild(panel);
            });
        }

        // --- CODEX LOGIC ---
        const profileModal = document.getElementById("profileModal");
        const modalBg = document.getElementById("modalBg");

        function openCodex(index) {
            currentProfileIndex = index;
            populateCodex();
            profileModal.classList.add("open");
        }

        function populateCodex() {
            const char = covenData[currentProfileIndex];
            modalBg.style.opacity = 0;
            
            setTimeout(() => {
                modalBg.className = "modal-bg-img " + char.fullCrop;
                modalBg.src = char.file;
                modalBg.onload = () => { modalBg.style.opacity = 1; };
                
                document.getElementById("uiName").innerText = char.name;
                document.getElementById("uiHouse").innerText = char.house;
                document.getElementById("uiAnima").innerText = char.anima;
                document.getElementById("uiCore").innerText = char.core;
                document.getElementById("uiLore").innerText = char.lore;
                document.getElementById("uiQuote").innerText = char.quote;
            }, 200);
        }

        document.getElementById("prevBtn").addEventListener("click", () => {
            currentProfileIndex = (currentProfileIndex - 1 + covenData.length) % covenData.length;
            populateCodex();
        });

        document.getElementById("nextBtn").addEventListener("click", () => {
            currentProfileIndex = (currentProfileIndex + 1) % covenData.length;
            populateCodex();
        });

        document.getElementById("modalClose").addEventListener("click", () => {
            profileModal.classList.remove("open");
        });

        // --- MYSTIQUE DOSSIER DECRYPTION SCRIPT ---
        const btnDossier = document.getElementById("btnDossier");
        btnDossier.addEventListener("click", () => {
            if(btnDossier.classList.contains("mystic-sealed")) return;
            btnDossier.classList.add("mystic-sealed");
            
            const originalText = "View Full Dossier";
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*+<>~✧✦";
            let iterations = 0;
            
            const interval = setInterval(() => {
                btnDossier.innerText = btnDossier.innerText.split('').map((char, index) => {
                    if(index < iterations / 2) {
                        return "ACCESS DENIED - LEVEL 9 REQUIRED"[index] || "";
                    }
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join('');
                
                iterations++;
                
                if(iterations >= 40) {
                    clearInterval(interval);
                    btnDossier.innerText = "REDACTED BY THE ARCHMAGE";
                    btnDossier.style.color = "#7ea5c9"; // Ethereal icy blue
                    btnDossier.style.borderColor = "#7ea5c9";
                    btnDossier.style.textShadow = "0 0 8px rgba(126, 165, 201, 0.8)";
                    
                    setTimeout(() => {
                        btnDossier.innerText = originalText;
                        btnDossier.style.color = "";
                        btnDossier.style.borderColor = "";
                        btnDossier.style.textShadow = "";
                        btnDossier.classList.remove("mystic-sealed");
                    }, 3500);
                }
            }, 30);
        });

        document.addEventListener("keydown", (e) => {
            if (!profileModal.classList.contains("open")) return;
            if (e.key === "ArrowRight") { 
                currentProfileIndex = (currentProfileIndex + 1) % covenData.length; 
                populateCodex(); 
            } 
            else if (e.key === "ArrowLeft") { 
                currentProfileIndex = (currentProfileIndex - 1 + covenData.length) % covenData.length; 
                populateCodex(); 
            } 
            else if (e.key === "Escape") { 
                profileModal.classList.remove("open"); 
            }
        });

        // --- PARTICLE PHYSICS SYSTEM (Golden Embers) ---
        const canvas = document.getElementById("magicCanvas");
        const ctx = canvas.getContext("2d");

        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;

        window.addEventListener("resize", () => {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        });

        class Ember {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w;
                this.y = h + Math.random() * 100;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = -(Math.random() * 0.8 + 0.2);
                this.speedX = (Math.random() * 0.8 - 0.4);
                this.life = Math.random() * 150 + 50;
                this.maxLife = this.life;
                this.color = `rgba(212, 175, 55, `; 
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.life * 0.05) * 0.5; 
                this.life--;
                if (this.life <= 0 || this.y < 0) this.reset();
            }
            draw() {
                const alpha = (this.life / this.maxLife) * 0.7;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color + alpha + ')';
                ctx.fill();
                
                if(this.size > 1.5) {
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = "rgba(212, 175, 55, 0.4)";
                } else {
                    ctx.shadowBlur = 0;
                }
            }
        }

        const embers = Array.from({ length: 60 }, () => new Ember());

        function animate() {
            ctx.clearRect(0, 0, w, h);
            embers.forEach(e => { e.update(); e.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
